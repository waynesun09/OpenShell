network_middlewares:
  - name: prototype-content-guard
    middleware: example/content-guard
    config:
      mode: redact
      terms:
        - prototype-secret
        - internal-only
      replacement: "[FILTERED]"
    on_error: fail_closed
    endpoints:
      include:
        - httpbin.org

network_policies:
  httpbin:
    name: httpbin
    endpoints:
      - host: httpbin.org
        port: 443
        protocol: rest
        rules:
          - allow:
              method: POST
              path: /anything
    binaries:
      - path: /usr/bin/curl
