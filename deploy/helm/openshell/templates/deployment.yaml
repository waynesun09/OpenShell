{{- include "openshell.validateValues" . }}
{{- if eq (include "openshell.workloadKind" .) "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openshell.fullname" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openshell.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    {{- include "openshell.gatewayPodTemplate" . | nindent 4 }}
{{- end }}
